# Deploy en Render: un web service (API + cliente estático) + Postgres managed.
# Las fotos viven en Cloudflare R2 (S3-compatible), NUNCA en el disco de Render.
services:
  - type: web
    name: nodo-clock-in
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build --workspace=client && npm run build --workspace=server
    startCommand: cd server && npm run migrate && node dist/scripts/encryptPii.js && npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nodo-clock-in-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PII_ENCRYPTION_KEY
        sync: false
      - key: PLANT_TIMEZONE
        value: America/Los_Angeles
      - key: FACE_PROVIDER
        value: review_only
      # Web Push opcional. Configurar las tres o dejar las tres vacías/ausentes.
      - key: VAPID_SUBJECT
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      # Cloudflare R2 — llenar en el dashboard de Render:
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_REGION
        value: auto

databases:
  - name: nodo-clock-in-db
    plan: basic-256mb
