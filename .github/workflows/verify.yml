name: Verify ClockAI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clockai_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d clockai_ci"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/clockai_ci
      JWT_SECRET: ci-access-secret-at-least-32-chars
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-chars
      PII_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      FACE_PROVIDER: fake
      NODE_ENV: test
      RUN_DB_INTEGRATION: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run migrate --workspace=server
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
